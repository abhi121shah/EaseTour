<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Easetour | The Curated Wanderer Login</title>
<meta name="description" content="Login to Easetour, your curated tourist guide system. Discover personalized travel experiences and manage your wanderlust journey.">
<meta name="keywords" content="tourist guide, travel management, login, Easetour, curated wanderer">
<meta name="author" content="Easetour">
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-bright": "#f8f9fa",
          "outline-variant": "#c3c6d4",
          "on-primary-fixed-variant": "#094298",
          "secondary-fixed": "#ffdbcb",
          "inverse-primary": "#b0c6ff",
          "surface-tint": "#2f5bb1",
          "secondary-fixed-dim": "#ffb692",
          "outline": "#737783",
          "secondary": "#9f4200",
          "primary": "#00347f",
          "primary-fixed": "#d9e2ff",
          "surface-container-lowest": "#ffffff",
          "primary-container": "#1a4ba1",
          "on-secondary-fixed": "#341100",
          "on-surface-variant": "#434652",
          "on-surface": "#191c1d",
          "surface-variant": "#e1e3e4",
          "primary-fixed-dim": "#b0c6ff",
          "surface-dim": "#d9dadb",
          "on-secondary": "#ffffff",
          "on-primary": "#ffffff",
          "surface-container": "#edeeef",
          "surface-container-highest": "#e1e3e4",
          "on-error": "#ffffff",
          "surface": "#f8f9fa",
          "surface-container-low": "#f3f4f5",
          "secondary-container": "#fc7727",
          "background": "#f8f9fa",
          "on-primary-fixed": "#001945",
          "on-background": "#191c1d"
        },
        fontFamily: {
          "headline": ["Plus Jakarta Sans"],
          "body": ["Be Vietnam Pro"],
          "label": ["Be Vietnam Pro"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .ambient-shadow { box-shadow: 0 20px 40px -10px rgba(0, 52, 127, 0.06); }
  .glass-effect { backdrop-filter: blur(12px); background: rgba(255, 255, 255, 0.7); }
  .cta-gradient { background: linear-gradient(to bottom, #00347f 0%, #1a4ba1 100%); }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col"
      style="background-repeat:no-repeat;background-size:cover;background-image:url('https://lh3.googleusercontent.com/aida-public/AB6AXuByWwVKZJINhXn2B6NRw3QnhnYcsi7LIb09yFu4BG8cufil_2cJV8Q-sa0XbJBGNu6PGUg2h5KOky8zT95n0iKA7ZzWAxmX4mrKGMeEmy2_MrEmSRyBSgar70MK1_bw2ZfVMAEenUQ74VMDdSHzjGvA6g79Uu4VMuHR28rF5IHCxh_PYDI5MIPAzBtk9_5UO7mT_IpXtAeqLrslHiQHmL7td7QNXRz2Q2bO6MRDFSJ04bqiYp_4fx_7-NYYWFkE_58H5KHEFyWirVI')">

<main class="flex-grow flex items-center justify-center p-2 md:p-7 lg:p-15 relative overflow-hidden">
  <div class="w-full max-w-7xl grid lg:grid-cols-2 bg-surface-container-lowest rounded-xl overflow-hidden ambient-shadow z-10">

    <!-- LEFT SIDE IMAGE -->
    <section class="hidden lg:block relative min-h-[500px] overflow-hidden">
      <img class="absolute inset-0 w-full h-full object-cover"
           src="https://lh3.googleusercontent.com/aida-public/AB6AXuByWwVKZJINhXn2B6NRw3QnhnYcsi7LIb09yFu4BG8cufil_2cJV8Q-sa0XbJBGNu6PGUg2h5KOky8zT95n0iKA7ZzWAxmX4mrKGMeEmy2_MrEmSRyBSgar70MK1_bw2ZfVMAEenUQ74VMDdSHzjGvA6g79Uu4VMuHR28rF5IHCxh_PYDI5MIPAzBtk9_5UO7mT_IpXtAeqLrslHiQHmL7td7QNXRz2Q2bO6MRDFSJ04bqiYp_4fx_7-NYYWFkE_58H5KHEFyWirVI"
           alt="Travel collage">
    </section>

    <!-- RIGHT SIDE LOGIN -->
    <section class="p-8 md:p-10 lg:p-15 flex flex-col justify-center bg-surface-container-low">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-7">
        <div class="w-12 h-12 rounded-full bg-secondary flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-3xl">link</span>
        </div>
        <div>
          <h1 class="font-headline font-extrabold text-2xl text-primary">Easetour</h1>
          <p class="text-[10px] uppercase tracking-widest text-secondary font-bold">Tourist Guide Management</p>
        </div>
      </div>

      <!-- Heading -->
      <div class="mb-7">
        <h2 class="text-4xl font-bold mb-2">Welcome Back!</h2>
        <p class="font-medium">Login to continue your journey</p>
      </div>

      <!-- Error message (shown only if login failed) -->
      <div th:if="${error}" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700 font-medium">
        <span class="material-symbols-outlined text-sm mr-1">error</span>
        <span th:text="${error}">Error message</span>
      </div>

      <!-- Login Form — POST /login handled by AppController.processLogin() -->
      <form class="space-y-6" th:action="@{/login}" method="post">

        <!-- Username -->
        <div class="relative">
          <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined">mail</span>
          <input type="text" name="username" id="username"
                 placeholder="Username / Email"
                 class="w-full h-14 pl-14 pr-6 rounded-md focus:ring-2 focus:ring-primary/20"/>
        </div>

        <!-- Password -->
        <div class="relative">
          <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined">lock</span>
          <input id="password" type="password" name="password"
                 placeholder="Password"
                 class="w-full h-14 pl-14 pr-14 rounded-md focus:ring-2 focus:ring-primary/20"/>
          <button type="button" id="togglePassword"
                  class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined">
            visibility
          </button>
        </div>

        <!-- Login Button -->
        <button class="w-full h-14 cta-gradient text-white font-headline font-bold rounded-md shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                type="submit">
          <span>Login</span>
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </form>

      <!-- Register -->
      <p class="mt-12 text-center text-sm">
        Don't have an account?
        <a href="#" class="text-orange-600 font-bold">Register Here</a>
      </p>
    </section>
  </div>
</main>

<!-- Footer -->
<footer class="w-full px-8 py-10 flex flex-col md:flex-row items-center justify-between gap-4 bg-slate-50">
  <div class="flex items-center gap-2">
    <span class="font-headline font-bold text-orange-600">Easetour.</span>
    <span class="text-xs text-slate-500 font-body">The Curated Wanderer.</span>
  </div>
  <nav class="flex gap-8 text-sm text-slate-500">
    <a href="#" class="underline hover:text-blue-800 transition-colors">Privacy Policy</a>
    <a href="#" class="underline hover:text-blue-800 transition-colors">Terms of Service</a>
  </nav>
  <p class="text-xs text-slate-500 font-body">© 2026 Easetour. The Curated Wanderer.</p>
</footer>

<script>
  const password = document.getElementById("password");
  const toggleBtn = document.getElementById("togglePassword");
  toggleBtn.addEventListener("click", function () {
    if (password.type === "password") {
      password.type = "text";
      toggleBtn.textContent = "visibility_off";
    } else {
      password.type = "password";
      toggleBtn.textContent = "visibility";
    }
  });
</script>
</body>
</html>
